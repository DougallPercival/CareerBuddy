services:
  postgres:
    image: postgres:16
    container_name: cb-pg-dev
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cbdev

    ports:
      - "5434:5432"

    volumes:
      - /home/cb-dev-data:/var/lib/postgresql/data:Z

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
